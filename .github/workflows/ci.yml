name: CI
on:
  push:
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: yarn install
      - name: Typecheck
        run: npx --no-install tsc --noEmit
      - name: Lint
        run: yarn lint
      # Note: expo publish with release-channels is deprecated.
      # PR preview builds would require EAS Update to be configured.
      # For now, CI only runs typecheck and lint.
