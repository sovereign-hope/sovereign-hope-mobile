name: CI
on:
  push:
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Setup EAS
        if: ${{ github.event_name == 'pull_request' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Create PR preview update
        if: ${{ github.event_name == 'pull_request' }}
        run: eas update --branch pr-${{ github.event.number }} --message "${{ github.event.pull_request.title }}"
      - name: Comment PR with preview link
        if: ${{ github.event_name == 'pull_request' }}
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            **Preview ready!**

            Scan with Expo Go or a development build:

            `pr-${{ github.event.number }}` branch on [EAS Update](https://expo.dev/accounts/sovereign-hope/projects/sovereign-hope-mobile/updates)
          comment_tag: expo-preview
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
